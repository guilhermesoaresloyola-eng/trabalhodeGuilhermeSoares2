<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contato</title>
</head>

<body>

<h1>Contato</h1>

<form action="sucesso.html">

<label for="nome">Nome:</label><br>
<input type="text" id="nome" name="nome" required><br><br>

<label for="email">E-mail:</label><br>
<input type="email" id="email" name="email" required><br><br>

<label for="assunto">Assunto:</label><br>
<input type="text" id="assunto" name="assunto" required><br><br>

<label for="mensagem">Mensagem:</label><br>
<textarea id="mensagem" name="mensagem" rows="5" cols="40" required></textarea><br><br>

<label for="telefone">Telefone:</label><br>
<input type="tel" id="telefone" name="telefone"><br><br>

<label for="data">Data de contato:</label><br>
<input type="date" id="data" name="data"><br><br>

<label for="motivo">Motivo do contato:</label><br>
<select id="motivo" name="motivo">
<option value="duvida">Dúvida</option>
<option value="proposta">Proposta de trabalho</option>
<option value="orcamento">Orçamento</option>
<option value="outro">Outro</option>
</select><br><br>

<input type="submit" value="Enviar">

</form>

</body>
</html>
